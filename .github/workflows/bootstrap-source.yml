name: Bootstrap Source Bundle

on:
  push:
    paths:
      - '.github/bootstrap/calds-runtime-github-publish.zip.b64.*'
      - '.github/workflows/bootstrap-source.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Rehydrate source bundle
        shell: pwsh
        run: |
          $parts = Get-ChildItem .github/bootstrap/calds-runtime-github-publish.zip.b64.* | Sort-Object Name
          if ($parts.Count -eq 0) { throw "No bootstrap parts found" }
          $b64 = ($parts | ForEach-Object { Get-Content $_.FullName -Raw }) -join ''
          [IO.File]::WriteAllBytes("calds-runtime-github-publish.zip", [Convert]::FromBase64String($b64))
          Expand-Archive calds-runtime-github-publish.zip -DestinationPath . -Force
          Remove-Item calds-runtime-github-publish.zip -Force
          Remove-Item .github/bootstrap/calds-runtime-github-publish.zip.b64.* -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if (-not (git diff --cached --quiet)) {
            git commit -m "Bootstrap full source bundle"
            git push
          }
