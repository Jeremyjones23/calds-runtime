name: Validate CalDS static site source

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate tracked static site files
        run: |
          test -f site/.nojekyll
          test -f site/index.html
          test -d site/cases
          echo "Runtime repo stores a tracked static-site copy for audit."
          echo "Public deployment is handled by Jeremyjones23/calds-public-cases."
